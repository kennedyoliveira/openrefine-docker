name: Check for New Releases

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest OpenRefine release
        id: openrefine
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const response = await github.rest.repos.getLatestRelease({
              owner: 'OpenRefine',
              repo: 'OpenRefine'
            });
            return response.data.tag_name;

      - name: Check if version already built
        id: check
        run: |
          CURRENT_VERSION="${{ steps.openrefine.outputs.result }}"
          echo "Latest OpenRefine version: $CURRENT_VERSION"

          if [ -f .released-versions ]; then
            if grep -q "^${CURRENT_VERSION}$" .released-versions; then
              echo "has_new=false" >> $GITHUB_OUTPUT
              echo "new_version=" >> $GITHUB_OUTPUT
              echo "Version $CURRENT_VERSION already built"
              exit 0
            fi
          fi

          echo "has_new=true" >> $GITHUB_OUTPUT
          echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "New version found: $CURRENT_VERSION"

  dispatch-build:
    needs: check-release
    if: needs.check-release.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build workflow
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = '${{ github.repository }}'.split('/');
            await github.rest.actions.createWorkflowDispatch({
              owner: owner,
              repo: repo,
              workflow_id: 'build-push.yml',
              ref: '${{ github.ref }}',
              inputs: {
                version: '${{ needs.check-release.outputs.new_version }}'
              }
            });

      - name: Record new version
        run: |
          echo "${{ needs.check-release.outputs.new_version }}" >> .released-versions

      - name: Commit version file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Record version ${{ needs.check-release.outputs.new_version }} - build triggered"
          file_pattern: ".released-versions"
