name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenRefine version to build (e.g., 3.10.1)'
        required: true
        type: string
      push_dockerhub:
        description: 'Push to Docker Hub'
        required: false
        type: boolean
        default: false
      update_latest:
        description: 'Update :latest tag'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'OpenRefine version to build'
        required: true
        type: string
      update_latest:
        description: 'Update :latest tag'
        required: false
        type: boolean
        default: true

env:
  VERSION: ${{ inputs.version }}
  UPDATE_LATEST: ${{ inputs.update_latest }}
  DOCKERHUB_REPO: kennedyoliveira/openrefine
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REPO }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest,enable=${{ env.UPDATE_LATEST == 'true' }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENREFINE_VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_METADATA_OUTPUT_TAGS: ${{ steps.meta.outputs.tags }}
          DOCKER_METADATA_OUTPUT_LABELS: ${{ steps.meta.outputs.labels }}

  push-dockerhub:
    needs: build
    if: inputs.push_dockerhub == true
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull from GHCR
        run: |
          docker pull ${{ env.GHCR_REPO }}:${{ env.VERSION }}
          if [ "${{ env.UPDATE_LATEST }}" == "true" ]; then
            docker pull ${{ env.GHCR_REPO }}:latest
          fi

      - name: Tag for Docker Hub
        run: |
          docker tag ${{ env.GHCR_REPO }}:${{ env.VERSION }} ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}
          if [ "${{ env.UPDATE_LATEST }}" == "true" ]; then
            docker tag ${{ env.GHCR_REPO }}:latest ${{ env.DOCKERHUB_REPO }}:latest
          fi

      - name: Push to Docker Hub
        run: |
          docker push ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}
          if [ "${{ env.UPDATE_LATEST }}" == "true" ]; then
            docker push ${{ env.DOCKERHUB_REPO }}:latest
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Docker Image v${{ env.VERSION }}
          body: |
            Docker image for OpenRefine ${{ env.VERSION }}
            
            **Image Tags:**
            - `ghcr.io/${{ github.repository }}:${{ env.VERSION }}`
            ${{ env.UPDATE_LATEST == 'true' && '- `ghcr.io/${{ github.repository }}:latest`' || '' }}
          draft: false
          prerelease: false
