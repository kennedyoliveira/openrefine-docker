name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenRefine version to build (e.g., 3.10.1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'OpenRefine version to build'
        required: true
        type: string

env:
  VERSION: ${{ inputs.version }}
  # Docker Hub repository name (change to your own if needed)
  DOCKERHUB_REPO: kennedyoliveira/openrefine
  # GitHub Container Registry repository
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          login-server: docker.io

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REPO }}
            ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENREFINE_VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Docker Image v${{ env.VERSION }}
          body: |
            Docker image for OpenRefine ${{ env.VERSION }}
            
            **Image Tags:**
            - `ghcr.io/${{ github.repository }}:${{ env.VERSION }}`
            - `ghcr.io/${{ github.repository }}:latest`
            - `kennedyoliveira/openrefine:${{ env.VERSION }}`
            - `kennedyoliveira/openrefine:latest`
          draft: false
          prerelease: false
